<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Airbnb Price Prediction</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{url_for('static', filename='style.css')}}">
    <style>
        .error-wrapper {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .error-card {
            background: #fff;
            border-radius: 20px;
            padding: 48px 40px;
            max-width: 520px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 20px rgba(255,59,48,0.1), 0 8px 32px rgba(0,0,0,0.06);
            animation: fadeSlideUp 0.5s ease both;
        }
        .error-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF5A5F, #E31C5F);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: #fff;
            margin: 0 auto 20px;
        }
        .error-card h2 {
            font-size: 22px;
            font-weight: 700;
            color: #1E293B;
            margin-bottom: 12px;
        }
        .error-card p {
            font-size: 14px;
            color: #64748B;
            margin-bottom: 8px;
        }
        .error-message {
            background: #FEF2F2;
            border: 1px solid #FECACA;
            border-radius: 12px;
            padding: 16px;
            margin: 20px 0;
            font-size: 13px;
            color: #991B1B;
            word-break: break-word;
            text-align: left;
        }
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            background: linear-gradient(135deg, #FF5A5F, #E31C5F);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(255,90,95,0.35);
            margin-top: 12px;
        }
        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(255,90,95,0.45);
            color: #fff;
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="header-brand">
                    <div class="logo-icon">
                        <i class="fab fa-airbnb"></i>
                    </div>
                    <div>
                        <h1 class="header-title">Airbnb Price Predictor</h1>
                        <p class="header-subtitle">Predict accurate Airbnb listing prices using Machine Learning</p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="error-wrapper">
        <div class="error-card">
            <div class="error-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h2>Prediction Failed</h2>
            <p>An error occurred during the prediction process.</p>
            <div class="error-message">
                <i class="fas fa-info-circle"></i> {{ error_message }}
            </div>
            <a href="/" class="btn-back">
                <i class="fas fa-arrow-left"></i>
                Try Again
            </a>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <span class="footer-text">Made with <i class="fas fa-heart" style="color:#FF5A5F;"></i> using</span>
                <div class="footer-tech">
                    <span class="tech-badge"><i class="fab fa-python"></i> Python</span>
                    <span class="tech-badge"><i class="fas fa-server"></i> Flask</span>
                    <span class="tech-badge"><i class="fas fa-brain"></i> Machine Learning</span>
                    <span class="tech-badge"><i class="fas fa-cubes"></i> Scikit-Learn</span>
                </div>
            </div>
        </div>
    </footer>
</body>

</html>
