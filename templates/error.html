<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error — Airbnb Price Prediction</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{url_for('static', filename='style.css')}}">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: var(--parchment);
        }

        .error-card {
            background: var(--ivory);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 48px 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }

        .error-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            background: #D32F2F;
        }

        .error-icon {
            width: 60px; height: 60px;
            border-radius: 50%;
            background: rgba(211,47,47,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 24px;
            color: #D32F2F;
        }

        .error-card h2 {
            font-family: var(--serif);
            font-size: 22px;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .error-card > p {
            font-size: 14px;
            color: var(--stone);
            margin-bottom: 0;
        }

        .error-message {
            background: rgba(211,47,47,0.04);
            border: 1px solid rgba(211,47,47,0.12);
            border-radius: 8px;
            padding: 14px 16px;
            margin: 20px 0;
            font-size: 13px;
            color: #7F1D1D;
            text-align: left;
            word-break: break-word;
        }

        .error-message i { margin-right: 6px; }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            background: var(--midnight);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: var(--sans);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s ease, box-shadow 0.2s ease;
            margin-top: 8px;
        }

        .btn-back:hover {
            background: #1E293B;
            box-shadow: var(--shadow-md);
            color: #fff;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="app-header">
        <div class="header-inner">
            <div class="header-brand">
                <div class="header-mark">
                    <i class="fas fa-chart-line"></i>
                </div>
                <div class="header-text">
                    <h1>Property Price Appraisal</h1>
                    <p>ML-powered nightly rate estimation for Airbnb hosts</p>
                </div>
            </div>
        </div>
    </header>

    <div class="error-page">
        <div class="error-card">
            <div class="error-icon">
                <i class="fas fa-triangle-exclamation"></i>
            </div>
            <h2>Appraisal Error</h2>
            <p>Something went wrong during the prediction process.</p>
            <div class="error-message">
                <i class="fas fa-circle-info"></i> {{ error_message }}
            </div>
            <a href="/" class="btn-back">
                <i class="fas fa-arrow-left"></i> Try Again
            </a>
        </div>
    </div>

    <!-- Footer -->
    <footer class="app-footer">
        <div class="footer-inner">
            <span class="footer-text">Built for Airbnb hosts</span>
            <div class="footer-divider"></div>
            <div class="footer-tech">
                <span><i class="fab fa-python"></i> Python</span>
                <span><i class="fas fa-server"></i> Flask</span>
                <span><i class="fas fa-brain"></i> Machine Learning</span>
                <span><i class="fas fa-cubes"></i> Scikit-Learn</span>
            </div>
        </div>
    </footer>
</body>
</html>
